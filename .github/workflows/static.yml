name: 部署靜態網頁至 GitHub Pages

on:
  # 當推送到 gh-pages 分支時觸發。
  push:
    branches: ["gh-pages"]

  # 允許從 Actions 標籤手動執行此工作流。
  workflow_dispatch:

# 設定 GITHUB_TOKEN 的權限，以允許部署到 GitHub Pages。
permissions:
  contents: read
  pages: write
  id-token: write

# 僅允許一個並行部署，跳過在執行中的部署與最新排隊部署之間排隊的執行。
# 但是，不要取消進行中的執行，因為我們希望允許這些生產部署完成。
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test-a11y:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出原始碼
        uses: actions/checkout@v6

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安裝測試依賴
        run: npm install

      - name: 安裝 Playwright 瀏覽器
        run: npx playwright install --with-deps chromium

      - name: 執行 A11y 測試
        run: npm test

  deploy:
    needs:
      - test-a11y
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 檢出原始碼
        uses: actions/checkout@v6

      - name: 設定 GitHub Pages
        uses: actions/configure-pages@v6

      - name: 準備部署內容
        run: |
          mkdir -p _site
          # 使用萬用字元排除所有點檔案、Markdown 規範與開發文件
          rsync -av --progress ./ _site/ \
            --exclude '.*' \
            --exclude '*.md' \
            --exclude 'docs/' \
            --exclude 'tests/' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'playwright.config.js' \
            --exclude '_site/'

          echo "--- 最終部署內容清單 ---"
          ls -R _site

      - name: 上傳部署構件
        uses: actions/upload-pages-artifact@v4
        with:
          # 上傳準備好的 _site 目錄。
          path: '_site'

      - name: 部署至 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
