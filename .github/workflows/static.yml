name: 部署靜態網頁至 GitHub Pages

on:
  # 當推送到 gh-pages 分支時觸發。
  push:
    branches: ["gh-pages"]

  # 允許從 Actions 標籤手動執行此工作流。
  workflow_dispatch:

# 設定 GITHUB_TOKEN 的權限，以允許部署到 GitHub Pages。
permissions:
  contents: read
  pages: write
  id-token: write

# 僅允許一個並行部署，跳過在執行中的部署與最新排隊部署之間排隊的執行。
# 但是，不要取消進行中的執行，因為我們希望允許這些生產部署完成。
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 檢出原始碼
        uses: actions/checkout@v6

      - name: 設定 GitHub Pages
        uses: actions/configure-pages@v6

      - name: 準備部署內容
        run: |
          mkdir -p _site
          # 1. 使用 rsync 同步，排除所有不需要的檔案。
          rsync -av --progress ./ _site/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '_site/' \
            --exclude 'docs/' \
            --exclude '.gemini/' \
            --exclude '.agents/' \
            --exclude 'GEMINI.md' \
            --exclude 'ENGINEERING_GUIDELINES.md' \
            --exclude 'README.md' \
            --exclude '.gitignore'

          # 2. 徹底檢查 _site 目錄（包含子目錄），確保這些檔案與目錄消失。
          find _site -name "GEMINI.md" -delete
          find _site -name "ENGINEERING_GUIDELINES.md" -delete
          find _site -name "README.md" -delete
          rm -rf _site/docs _site/.gemini _site/.agents

          # 3. 列出最終清單供日誌查閱。
          echo "--- 最終打包清單 ---"
          find _site -maxdepth 2

      - name: 上傳部署構件
        uses: actions/upload-pages-artifact@v4
        with:
          # 上傳準備好的 _site 目錄。
          path: '_site'

      - name: 部署至 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
