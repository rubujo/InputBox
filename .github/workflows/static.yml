name: 部署靜態網頁至 GitHub Pages

on:
  # 當推送到 gh-pages 分支且網站相關檔案有變更時觸發。
  push:
    branches: ["gh-pages"]
    paths:
      - "index.html"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.js"
      - ".github/workflows/static.yml"

  # 允許從 Actions 標籤手動執行此工作流。
  workflow_dispatch:

# 設定 GITHUB_TOKEN 的權限，以允許部署到 GitHub Pages。
permissions:
  contents: read
  pages: write
  id-token: write

# 僅保留同一分支最新的一次部署，避免過時工作流持續消耗 runner 資源。
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy:
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 檢出原始碼
        uses: actions/checkout@v6

      - name: 設定 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 快取 Playwright 瀏覽器
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: 安裝測試依賴
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: 安裝 Playwright 瀏覽器
        run: npx playwright install --with-deps chromium

      - name: 執行 A11y 測試
        run: npm test

      - name: 設定 GitHub Pages
        uses: actions/configure-pages@v6

      - name: 準備部署內容
        run: |
          mkdir -p _site
          # 僅部署首頁檔案
          cp index.html _site/index.html

          echo "--- 最終部署內容清單 ---"
          ls -R _site

      - name: 上傳部署構件
        uses: actions/upload-pages-artifact@v4
        with:
          # 上傳準備好的 _site 目錄。
          path: "_site"

      - name: 部署至 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
