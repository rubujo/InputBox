name: 建置與發佈

on:
  push:
    tags:
      # 當推送符合語意版本的標籤（如 v1.0.0）時觸發，排除非版本標籤（如 vtest）。
      - 'v[0-9]*'
  workflow_call:
    secrets:
      VT_API_KEY:
        required: false

concurrency:
  # 相同 tag 的重複發版只保留最新一次，避免重覆占用 runner 與 API 配額。
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    # 定義環境變數，方便統一管理。
    env:
      DOTNET_MAJOR_VERSION: '10'
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      DOTNET_NOLOGO: '1'
      PUBLISH_DIR: "./src/InputBox/out"
      EXE_NAME: 'InputBox.exe'
      SHA256_HASH: ''
      ZIP_FILENAME: ''

    steps:
    - name: 簽出原始碼（Checkout）
      uses: actions/checkout@v6
      with:
        # 發版僅需目前 tag 對應提交，避免抓取完整歷史紀錄。
        fetch-depth: 1

    - name: 驗證版本標籤來源為 main 最新提交
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        # 僅抓取 main 的最新遠端頭，避免不必要的歷史下載。
        git fetch --no-tags --depth=1 origin +refs/heads/main:refs/remotes/origin/main

        $tagCommit = (git rev-list -n 1 "${{ github.ref_name }}").Trim()
        $mainHead = (git rev-parse origin/main).Trim()

        Write-Host "Tag commit:  $tagCommit"
        Write-Host "main HEAD:   $mainHead"

        if ([string]::IsNullOrWhiteSpace($tagCommit) -or [string]::IsNullOrWhiteSpace($mainHead)) {
            Write-Error "無法解析版本標籤或 main 分支的提交資訊。"
        }

        if ($tagCommit -ne $mainHead) {
            Write-Error "正式版本標籤只能從 main 分支最新提交建立；目前 tag 未指向 origin/main 的最新 commit。"
        }

        Write-Host "版本標籤來源驗證通過。"

    - name: 安裝 .NET 環境
      uses: actions/setup-dotnet@v5
      with:
        # 使用 GitHub Actions 語法來讀取 env 變數。
        dotnet-version: '${{ env.DOTNET_MAJOR_VERSION }}.x'
        # Release 觸發頻率遠低於 cache TTL（7 天），不快取以避免無效寫入。

    - name: 執行專案發佈（Publish）
      working-directory: ./src/InputBox
      run: >
        dotnet publish -c Release -r win-x64
        --self-contained true
        -p:PublishSingleFile=true
        -p:PublishReadyToRun=true
        -o out

    - name: 自動產生第三方套件授權聲明（nuget-license）
      shell: pwsh
      run: |
        dotnet tool restore
        Write-Host "掃描專案 NuGet 套件並匯出 ThirdPartyNotices.txt……"
        # -i：指定專案檔路徑。
        # -o：指定輸出格式為 Markdown（讓純文字檔內有整齊的表格排版）。
        # -fo：指定輸出的檔案名稱（File Output）。
        dotnet tool run nuget-license -i ./src/InputBox/InputBox.csproj -o Markdown -fo ThirdPartyNotices.txt

        if (Test-Path "ThirdPartyNotices.txt") {
            Write-Host "✅ 成功產生專案依賴套件的 ThirdPartyNotices.txt！"
        } else {
            Write-Warning "⚠️ 未產生 ThirdPartyNotices.txt，可能是因為專案目前沒有依賴任何第三方套件。"
        }

    - name: 產生執行檔的雜湊值（SHA256）
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $exePath = Join-Path -Path "${{ env.PUBLISH_DIR }}" -ChildPath "${{ env.EXE_NAME }}"

        if (Test-Path $exePath) {
            $hash = (Get-FileHash $exePath -Algorithm SHA256).Hash
            "SHA256_HASH=$hash" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host "成功產生雜湊值：$hash"
        } else {
            Write-Error "找不到執行檔（$exePath），請檢查發佈步驟！"
        }

    - name: 打包並壓縮發佈檔案（ZIP Archive）
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $tagName = "${{ github.ref_name }}"
        $zipName = "InputBox-$tagName-win-x64.zip"
        "ZIP_FILENAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

        # 1. 建立外層目錄（dist）、內層目錄（dist/InputBox）與授權子目錄（dist/InputBox/Licenses）。
        $distDir = "./dist"
        $packDir = Join-Path $distDir "InputBox"
        $licensesDir = Join-Path $packDir "Licenses"
        if (Test-Path $distDir) {
            Remove-Item -Recurse -Force $distDir
        }
        New-Item -ItemType Directory -Force -Path $packDir | Out-Null
        New-Item -ItemType Directory -Force -Path $licensesDir | Out-Null

        # 2. 複製執行檔與專案文件到內層目錄。
        #    - 執行檔與 README.md 放根目錄。
        #    - 專案授權（LICENSE）保留根目錄（業界慣例：使用者預期在根層找到它）。
        #    - ThirdPartyNotices.txt 放入 Licenses/ 子目錄。
        Copy-Item -Path (Join-Path ${{ env.PUBLISH_DIR }} ${{ env.EXE_NAME }}) -Destination $packDir
        $rootDocs = @("LICENSE", "README.md")
        foreach ($doc in $rootDocs) {
            if (Test-Path $doc) {
                Copy-Item -Path $doc -Destination $packDir
            }
        }
        if (Test-Path "ThirdPartyNotices.txt") {
            Copy-Item -Path "ThirdPartyNotices.txt" -Destination $licensesDir
        }

        # 3. 動態抓取 .NET 官方授權檔案（含最相近 Tag／分支 Fallback）。
        Write-Host "=== 開始動態下載 .NET 官方授權檔案 ==="
        $runtimeInfo = dotnet --list-runtimes

        $majorVersion = "${{ env.DOTNET_MAJOR_VERSION }}"
        $runtimeLine = $runtimeInfo | Where-Object { $_ -match "^Microsoft\.NETCore\.App ($majorVersion\.\d+\.\d+)" } | Select-Object -Last 1
        $githubHeaders = @{
            'User-Agent' = 'InputBox-Release-Workflow'
            'X-GitHub-Api-Version' = '2022-11-28'
        }

        function Get-TagStageRank {
            param([string]$TagName)

            if ($TagName -match '(?i)preview') { return 3 }
            if ($TagName -match '(?i)rc') { return 2 }
            if ($TagName -match '(?i)rtm|servicing') { return 1 }
            return 0
        }

        function Get-ClosestDotnetTag {
            param(
                [string]$Repo,
                [version]$TargetVersion
            )

            $tagsApiUrl = "https://api.github.com/repos/dotnet/$Repo/tags?per_page=100"

            try {
                $tagResponse = Invoke-RestMethod -Uri $tagsApiUrl -Headers $githubHeaders -ErrorAction Stop
            } catch {
                Write-Warning "⚠️ 無法查詢 dotnet/$Repo 的 Tag 清單：$($_.Exception.Message)"
                return $null
            }

            $candidates = foreach ($tagItem in $tagResponse) {
                if ($tagItem.name -match '^v(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)') {
                    [pscustomobject]@{
                        Name = $tagItem.name
                        Major = [int]$Matches['major']
                        Minor = [int]$Matches['minor']
                        Patch = [int]$Matches['patch']
                        StageRank = Get-TagStageRank -TagName $tagItem.name
                    }
                }
            }

            $nearest = $candidates |
                Where-Object { $_.Major -eq $TargetVersion.Major -and $_.Minor -eq $TargetVersion.Minor } |
                Sort-Object `
                    @{ Expression = { [Math]::Abs($_.Patch - $TargetVersion.Build) } }, `
                    @{ Expression = { $_.StageRank } }, `
                    @{ Expression = { $_.Patch }; Descending = $true } |
                Select-Object -First 1

            return $nearest.Name
        }

        function Save-GitHubFileWithFallback {
            param(
                [string]$Repo,
                [string[]]$Refs,
                [string]$File,
                [string]$OutPath
            )

            foreach ($ref in ($Refs | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -Unique)) {
                $rawUrl = "https://raw.githubusercontent.com/dotnet/$Repo/$ref/$File"
                $metadataUrl = "https://api.github.com/repos/dotnet/$Repo/contents/$File?ref=$([uri]::EscapeDataString($ref))"
                Write-Host "嘗試下載：dotnet/$Repo@$ref -> $File"

                try {
                    Invoke-WebRequest -Uri $rawUrl -OutFile $OutPath -Headers $githubHeaders -ErrorAction Stop
                    Write-Host "✅ 成功儲存為 $(Split-Path $OutPath -Leaf)（來源：$ref / raw）"
                    return $true
                } catch {
                    try {
                        $metadata = Invoke-RestMethod -Uri $metadataUrl -Headers $githubHeaders -ErrorAction Stop
                        if (-not [string]::IsNullOrWhiteSpace($metadata.download_url)) {
                            Invoke-WebRequest -Uri $metadata.download_url -OutFile $OutPath -Headers $githubHeaders -ErrorAction Stop
                            Write-Host "✅ 成功儲存為 $(Split-Path $OutPath -Leaf)（來源：$ref / api）"
                            return $true
                        }
                    } catch {
                        # Ignore and continue to the next candidate below.
                    }

                    Write-Warning "⚠️ 無法從 $ref 下載 $File，繼續嘗試下一個候選來源。"
                }
            }

            return $false
        }

        if ($runtimeLine -match "^Microsoft\.NETCore\.App (\d+\.\d+\.\d+)") {
            $version = $Matches[1]
            $tag = "v$version"
            $targetVersion = [version]$version
            $releaseBranch = "release/$($targetVersion.Major).$($targetVersion.Minor)"
            Write-Host "偵測到目前使用的 .NET Runtime 版本為：$version，優先使用 GitHub 標籤：$tag"

            $filesToDownload = @(
                @{ Repo = "runtime";  File = "LICENSE.TXT";             Out = "DOTNET_RUNTIME_LICENSE.txt" },
                @{ Repo = "runtime";  File = "THIRD-PARTY-NOTICES.TXT"; Out = "DOTNET_RUNTIME_THIRD_PARTY_NOTICES.txt" },
                @{ Repo = "winforms"; File = "LICENSE.TXT";             Out = "DOTNET_WINFORMS_LICENSE.txt" },
                @{ Repo = "winforms"; File = "THIRD-PARTY-NOTICES.TXT"; Out = "DOTNET_WINFORMS_THIRD_PARTY_NOTICES.txt" }
            )

            $repoRefCandidates = @{}
            foreach ($repoName in ($filesToDownload.Repo | Select-Object -Unique)) {
                $closestTag = Get-ClosestDotnetTag -Repo $repoName -TargetVersion $targetVersion
                if ($closestTag) {
                    Write-Host "dotnet/$repoName 最相近的可用 Tag 候選：$closestTag"
                } else {
                    Write-Warning "⚠️ dotnet/$repoName 找不到符合 $($targetVersion.Major).$($targetVersion.Minor).x 的 Tag，將直接退回分支。"
                }

                $repoRefCandidates[$repoName] = @($tag, $closestTag, $releaseBranch, 'main')
            }

            foreach ($item in $filesToDownload) {
                $outPath = Join-Path $licensesDir $item.Out
                $downloaded = Save-GitHubFileWithFallback -Repo $item.Repo -Refs $repoRefCandidates[$item.Repo] -File $item.File -OutPath $outPath
                if (-not $downloaded) {
                    Write-Warning "⚠️ 最終仍無法取得 $($item.Out)。"
                }
            }
        } else {
            Write-Warning "❌ 無法解析 .NET Runtime 的版本號，請確認安裝步驟。"
        }

        # 4. 動態解析 csproj，抓取套件授權與產生 usb.ids 授權檔案。
        Write-Host "=== 開始解析 csproj 抓取第三方套件版本並處理授權 ==="

        $csprojPath = "./src/InputBox/InputBox.csproj"
        if (Test-Path $csprojPath) {
            # 將 csproj 轉為 XML 物件以便解析。
            [xml]$csproj = Get-Content $csprojPath

            # 尋找特定的 PackageReference 節點。
            $gameInputRef = $csproj.Project.ItemGroup.PackageReference | Where-Object { $_.Include -eq 'GameInput.Net' }
            $usbVendorsRef = $csproj.Project.ItemGroup.PackageReference | Where-Object { $_.Include -eq 'UsbVendorsLibrary' }

            # 如果有找到版本號，前面補上 v；如果沒找到（理論上不會發生），退回抓 main。
            $gameInputVer = if ($gameInputRef.Version) { "v" + $gameInputRef.Version } else { "main" }
            $usbVendorsVer = if ($usbVendorsRef.Version) { "v" + $usbVendorsRef.Version } else { "main" }

            Write-Host "解析到 GameInput.Net 版本標籤: $gameInputVer"
            Write-Host "解析到 UsbVendorsLibrary 版本標籤: $usbVendorsVer"

            $extraFiles = @(
                @{ Url = "https://raw.githubusercontent.com/Cephy314/GameInputNet/$gameInputVer/LICENSE"; Out = "GameInputNet_LICENSE.txt" },
                @{ Url = "https://raw.githubusercontent.com/Cephy314/UsbVendorsLibrary/$usbVendorsVer/LICENSE"; Out = "UsbVendorsLibrary_LICENSE.txt" }
            )

            foreach ($item in $extraFiles) {
                $outPath = Join-Path $licensesDir $item.Out
                Write-Host "嘗試下載: $($item.Url)"
                try {
                    Invoke-WebRequest -Uri $item.Url -OutFile $outPath -ErrorAction Stop
                    Write-Host "✅ 成功儲存為 $($item.Out)"
                } catch {
                    Write-Warning "⚠️ 無法下載 $($item.Url)，請確認該套件的 GitHub 庫是否有此版本標籤！"
                }
            }
        } else {
            Write-Warning "找不到 csproj 檔案 ($csprojPath)，無法動態抓取套件版本。"
        }

        Write-Host "產生 usb.ids 的歸因聲明檔……"
        # 以事實性歸因聲明（factual attribution notice）替代硬編碼的授權條款全文。
        # 理由：UsbVendorsLibrary NuGet 套件所嵌入的 usb.ids 副本已移除原始授權標頭，
        # 無法在發佈時提供從來源可追溯的授權文本。直接產生 BSD 全文會造成文件來源
        # 無法稽核的問題。改以聲明形式標示資料來源、官方雙重授權及本專案所採用的條款。
        $attributionText = @(
            'USB ID Database (usb.ids) Attribution Notice',
            '=============================================',
            '',
            'This release package includes data from the USB ID Database (usb.ids),',
            'used via the UsbVendorsLibrary NuGet package.',
            '',
            '  Source:     http://www.linux-usb.org/usb-ids.html',
            '  Maintained: Stephen J. Gowdy <linux.usb.ids@gmail.com>',
            '  License:    Dual-licensed — GPL-2.0-or-later OR BSD-3-Clause',
            '              (as stated at the official source above)',
            '',
            'Note: The usb.ids file itself does not contain an embedded license',
            'header or copyright notice. The dual-license terms above are stated',
            'solely on the official project webpage (the Source URL above).',
            '',
            'This project redistributes the embedded usb.ids data under the',
            'BSD 3-Clause License, which is one of the two licenses explicitly',
            'stated at the official source listed above.',
            '',
            'For the full text of the BSD 3-Clause License, see:',
            '  https://opensource.org/license/bsd-3-clause',
            '',
            'For the full text of the GNU General Public License (version 2 or later), see:',
            '  https://opensource.org/license/GPL-2.0'
        ) -join "`n"
        $attributionText | Out-File -FilePath (Join-Path $licensesDir "usb_ids_LICENSE.txt") -Encoding utf8
        Write-Host "✅ 成功建立 usb_ids_LICENSE.txt"
        Write-Host "======================================="

        # 5. 執行壓縮。
        Compress-Archive -Path $packDir -DestinationPath $zipName -CompressionLevel Optimal

    - name: 檢查 VirusTotal API Key 設定
      id: vt-config
      shell: pwsh
      env:
        VT_API_KEY: ${{ secrets.VT_API_KEY }}
      run: |
        if ([string]::IsNullOrWhiteSpace($env:VT_API_KEY)) {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Warning "未設定 VT_API_KEY，略過 VirusTotal 掃描。"
        } else {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "已偵測到 VT_API_KEY，將進行 VirusTotal 掃描。"
        }

    - name: 建立 GitHub Release
      id: release
      uses: softprops/action-gh-release@v3
      with:
        files: ${{ env.ZIP_FILENAME }}
        # 根據 Commit 與 PR 自動生成版本說明（Changelog）。
        generate_release_notes: true
        body: |
          ## 📦 輸入框發佈摘要
          - **版本號碼**：`${{ github.ref_name }}`
          - **目標平台**：Windows x64
          - **執行環境**：.NET 10（已隨附 Runtime，無需額外安裝）
          - **執行檔案的雜湊值（SHA256）**：`${{ env.SHA256_HASH }}`

          ---
          > [!NOTE]
          > 本版本由 GitHub Actions 自動建置並發佈。詳細變更內容請參考下方的自動產生說明。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 使用 VirusTotal 掃描並更新 Release
      if: ${{ steps.vt-config.outputs.enabled == 'true' }}
      continue-on-error: true
      uses: cssnr/virustotal-action@v2
      with:
        vt_api_key: ${{ secrets.VT_API_KEY }}
        release_id: ${{ steps.release.outputs.id }}
        rate_limit: 4
        sha256: true
        update_release: true
        release_heading: "🛡️ **VirusTotal 掃描結果：**"
        summary: true