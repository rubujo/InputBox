name: 建置與發布輸入框

on:
  push:
    tags:
      # 當推送 tag 如 v1.0.0 時觸發。
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    # 定義全域變數，方便統一修改路徑。
    env:
      EXE_RELATIVE_PATH: "./src/InputBox/bin/Release/net10.0-windows/win-x64/publish/InputBox.exe"

    steps:
    - name: 簽出程式碼
      uses: actions/checkout@v4

    - name: 安裝 .NET 環境
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: 執行專案建置
      working-directory: ./src/InputBox
      run: dotnet build -c Release

    - name: 執行專案發布
      working-directory: ./src/InputBox
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true

    - name: 產生檔案雜湊值
      shell: pwsh
      run: |
        # 指定發布後的預設 .exe 輸出路徑（使用全域變數）。
        if (Test-Path ${{ env.EXE_RELATIVE_PATH }}) {
          $hash = (Get-FileHash ${{ env.EXE_RELATIVE_PATH }} -Algorithm SHA256).Hash
          echo "SHA256_HASH=$hash" >> $env:GITHUB_ENV
          echo "產生的雜湊值為：$hash"
        } else {
          Write-Error "找不到執行檔，請檢查發布路徑！"
          exit 1
        }

    - name: 建立並壓縮發布檔案
      shell: pwsh
      run: |
        # 產生時間戳記。
        $timestamp = Get-Date -Format "yyyyMMddHHmmss"
        $zipName = "InputBox-win-x64_$timestamp.zip"
        
        # 將檔名存入環境變數，方便下一個步驟讀取。
        echo "ZIP_FILENAME=$zipName" >> $env:GITHUB_ENV

        # 建立資料夾並複製檔案（準備打包）。
        New-Item -ItemType Directory -Force -Path ./dist/InputBox
        Copy-Item -Path ${{ env.EXE_RELATIVE_PATH }} -Destination ./dist/InputBox/
        
        # 複製方案根目錄的 LICENSE 與 README.md。
        if (Test-Path "LICENSE") { Copy-Item -Path "LICENSE" -Destination ./dist/InputBox/ }
        if (Test-Path "README.md") { Copy-Item -Path "README.md" -Destination ./dist/InputBox/ }

        # 壓縮「整個 InputBox 資料夾」（使用動態檔名）。
        Compress-Archive -Path ./dist/InputBox -DestinationPath $zipName -CompressionLevel Optimal

    - name: 建立 GitHub 發布版本
      uses: softprops/action-gh-release@v2
      with:
        # 使用上一步驟產生的動態檔名。
        files: ${{ env.ZIP_FILENAME }}
        body: |
          ## 📦 輸入框發布摘要
          - **目標平台**：Windows x64
          - **壓縮檔名**：${{ env.ZIP_FILENAME }}
          - **執行環境**：.NET 10（已內含，無需安裝 Runtime）
          - **檔案指紋（SHA256）**：`${{ env.SHA256_HASH }}`

          ---
          *本版本由 GitHub Actions 自動建置並發布。*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}