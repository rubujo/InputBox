name: 程式碼建置檢查

on:
  push:
    # 排除標籤推送，因為標籤通常會走發佈流程。
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-check:
    runs-on: windows-latest
    permissions:
      # 只需要讀取原始碼進行建置即可。
      contents: read

    # 定義環境變數，方便統一管理。
    env:
      DOTNET_MAJOR_VERSION: '10'
      # xUnit v3 MTP 的 coverage 輸出在 bin 輸出目錄的 TestResults 子目錄下。
      COVERAGE_GLOB: tests/**/coverage.cobertura.xml
      REPORT_DIR: CoverageReport
      # 行覆蓋率最低門檻（%）。低於此值時 CI 強制失敗。
      # WinForms UI 層雖已加入少量 FlaUI 冒煙測試，但大部分互動與硬體流程仍不納入 coverage 基線，
      # 因此整體行覆蓋率仍維持在低檔，這裡僅作為基本迴歸守衛。
      # 若移除已測邏輯或測試檔，CI 應能即時失敗提醒。
      COVERAGE_THRESHOLD: '2'

    steps:
    - name: 簽出原始碼（Checkout）
      uses: actions/checkout@v6

    - name: 安裝 .NET 環境
      uses: actions/setup-dotnet@v5
      with:
        # 使用 GitHub Actions 語法來讀取 env 變數。
        dotnet-version: '${{ env.DOTNET_MAJOR_VERSION }}.x'
        # 啟用快取功能，加速 NuGet 套件還原。
        cache: true
        # 同時涵蓋主專案與測試專案，確保 NuGet 套件快取完整。
        cache-dependency-path: '**/*.csproj'

    - name: 執行專案建置（Build）
      working-directory: ./src/InputBox
      # 使用 --no-incremental 確保每次都是完整檢查，避免部分編譯遺漏錯誤。
      run: dotnet build -c Release --no-incremental

    - name: 建置測試專案（Build Tests）
      working-directory: ./tests/InputBox.Tests
      run: dotnet build -c Release --no-incremental

    - name: 執行非 UI 單元測試並收集覆蓋率（Test + Coverage）
      working-directory: ./tests/InputBox.Tests
      # xUnit v3 + MTP 原生模式（global.json test.runner=Microsoft.Testing.Platform）。
      # UI 冒煙測試使用 FlaUI，與一般邏輯測試分流，避免桌面自動化影響 coverage 基線穩定度。
      # --no-build 重用上一步的建置產出；coverage 輸出至 bin/Release 目錄下的 TestResults 子目錄。
      run: |
        dotnet test --project InputBox.Tests.csproj -c Release --no-build `
          --filter-not-trait "Category=UI" `
          --coverage `
          --coverage-output-format cobertura `
          --coverage-output coverage.cobertura.xml

    - name: 安裝 ReportGenerator 並產生覆蓋率報告
      run: |
        dotnet tool install -g dotnet-reportgenerator-globaltool
        reportgenerator `
          "-reports:${{ env.COVERAGE_GLOB }}" `
          "-targetdir:${{ env.REPORT_DIR }}" `
          "-reporttypes:Html;Cobertura;MarkdownSummaryGithub"

    - name: 寫入覆蓋率摘要至 GitHub Step Summary
      run: |
        Get-Content -Path "${{ env.REPORT_DIR }}/SummaryGithub.md" |
          Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

    - name: 上傳覆蓋率報告（Artifact）
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: ${{ env.REPORT_DIR }}
        if-no-files-found: error

    - name: 覆蓋率門檻檢查（Coverage Threshold Gate）
      run: |
        $xml = [xml](Get-Content -Path "${{ env.REPORT_DIR }}/Cobertura.xml" -Encoding UTF8)
        $lineRate = [double]$xml.coverage.'line-rate'
        $pct = [Math]::Round($lineRate * 100, 1)
        Write-Host "目前行覆蓋率：$pct%（最低門檻：${{ env.COVERAGE_THRESHOLD }}%）"
        if ($pct -lt [double]"${{ env.COVERAGE_THRESHOLD }}") {
          Write-Host "##[error]覆蓋率 $pct% 低於最低門檻 ${{ env.COVERAGE_THRESHOLD }}%，請補充測試後再提交。"
          exit 1
        }
        Write-Host "覆蓋率檢查通過。"

    - name: 建置與測試成功通知
      if: success()
      run: Write-Host "建置與測試全部通過！程式碼狀態良好。"

  ui-smoke:
    runs-on: windows-latest
    timeout-minutes: 8
    needs: build-check
    permissions:
      contents: read

    env:
      DOTNET_MAJOR_VERSION: '10'
      INPUTBOX_RUN_UI_TESTS: '1'
      INPUTBOX_UI_ARTIFACT_DIR: '${{ github.workspace }}/TestResults/UiArtifacts'

    steps:
    - name: 簽出原始碼（Checkout）
      uses: actions/checkout@v6

    - name: 安裝 .NET 環境
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '${{ env.DOTNET_MAJOR_VERSION }}.x'
        cache: true
        cache-dependency-path: '**/*.csproj'

    - name: 建置主專案（Build App）
      working-directory: ./src/InputBox
      run: dotnet build -c Release --no-incremental

    - name: 建置測試專案（Build Tests）
      working-directory: ./tests/InputBox.Tests
      run: dotnet build -c Release --no-incremental

    - name: 執行 UI 冒煙測試（FlaUI Smoke）
      id: ui_smoke
      continue-on-error: true
      working-directory: ./tests/InputBox.Tests
      run: dotnet test --project InputBox.Tests.csproj -c Release --no-build --filter-trait "Category=UI"

    - name: 寫入 UI 冒煙測試警告摘要
      if: always() && steps.ui_smoke.outcome == 'failure'
      run: |
        "## ⚠️ UI 冒煙測試未通過" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
        "此工作為報告用途，不阻擋主建置與一般單元測試；請下載 Artifact 進行排查。" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
        "- Artifact 名稱：ui-smoke-artifacts" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
        "- 優先檢查：桌面擷圖 PNG 與診斷 TXT" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
        "- 診斷 TXT 會包含 lastStep、applicationWindows 與 openMenus 摘要，可直接定位卡住步驟。" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

    - name: 上傳 UI 冒煙測試失敗產物（Artifacts）
      if: always() && steps.ui_smoke.outcome == 'failure'
      uses: actions/upload-artifact@v7
      with:
        name: ui-smoke-artifacts
        path: TestResults/UiArtifacts
        if-no-files-found: ignore