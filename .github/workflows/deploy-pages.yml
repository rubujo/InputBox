name: 部署靜態網頁 (GitHub Pages)

on:
  push:
    branches:
      - gh-pages

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 簽出原始碼 (Checkout)
        uses: actions/checkout@v4

      - name: 設定 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 準備發佈內容 (僅保留 index.html)
        run: |
          mkdir public
          cp index.html public/

      - name: 上傳 Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: 部署至 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
